[build]
  publish = "static"

# Proxy API calls to Vercel backend
[[redirects]]
  from = "/api/*"
  to = "https://comvoy-api.vercel.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://comvoy-api.vercel.app/health"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
